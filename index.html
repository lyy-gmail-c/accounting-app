<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1A73E8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>MiniBook - 极简双端记账</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/mobile.css">
  <link rel="stylesheet" href="css/desktop.css">
</head>
<body>
  <div id="app">
    <!-- ===== 手机端布局 ===== -->
    <div class="mobile-layout mobile-only">
      <div id="mobile-page-record" class="mobile-page active"></div>
      <div id="mobile-page-detail" class="mobile-page"></div>
      <div id="mobile-page-stats" class="mobile-page"></div>
      <div id="mobile-page-profile" class="mobile-page"></div>
      <nav id="bottom-tabs" class="bottom-tabs"></nav>
    </div>

    <!-- ===== PC 端布局 ===== -->
    <div class="pc-layout desktop-only">
      <aside id="sidebar" class="sidebar"></aside>
      <main class="main-content">
        <div id="pc-page-records" class="pc-page active"></div>
        <div id="pc-page-stats" class="pc-page"></div>
        <div id="pc-page-categories" class="pc-page"></div>
        <div id="pc-page-accounts" class="pc-page"></div>
        <div id="pc-page-data" class="pc-page"></div>
      </main>
    </div>
  </div>

  <!-- JS: 加载顺序 app(含图标+日期工具) → db → mobile → desktop -->
  <script src="js/app.js"></script>
  <script src="js/db.js"></script>
  <script src="js/mobile.js"></script>
  <script src="js/desktop.js"></script>
</body>
</html>
